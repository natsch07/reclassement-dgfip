const daysBetween = (d1,d2) => Math.round((new Date(d2)-new Date(d1))/86400000);
const addDays = (s,days) => { const d=new Date(s); d.setDate(d.getDate()+Math.round(days)); return d.toLocaleDateString("fr-FR"); };
const fmt = (j) => {
  if(j===null||j===undefined||isNaN(j)) return "—";
  if(j===0) return "0 jour";
  const sign = j<0?"-":"";
  j = Math.abs(j);
  const ans=Math.floor(j/365),mois=Math.floor((j%365)/30),jr=j%365%30;
  const parts = [ans&&`${ans} an${ans>1?"s":""}`,mois&&`${mois} mois`,jr&&`${jr} j`].filter(Boolean);
  return sign + (parts.length ? parts.join(" ") : "0 j");
};

// Formule : conservée = ((acquis - deduction) × pct/100) + fixe
// le tout clampé entre 0 et la durée de l'échelon de destination
const calcC = (acq, pct, fixe, deduction, duree) => {
  const base = Math.max(0, acq - (deduction||0));
  const raw = Math.floor(base * pct / 100) + (fixe||0);
  const clamped = Math.max(0, raw);
  return duree!==null ? Math.min(clamped, duree) : clamped;
};

const fmtFormule = (pct, fixe, deduction) => {
  const parts = [];
  if(deduction > 0 && pct > 0){
    parts.push(`${pct}% × (acquis − ${fmt(deduction)})`);
  } else if(pct > 0){
    parts.push(`${pct}% × acquis`);
  }
  if(fixe > 0) parts.push(`+ ${fmt(fixe)}`);
  if(parts.length === 0) return "Sans ancienneté";
  return parts.join(" ");
};

const fmtSeuil = (min, max) => {
  if(!min && !max) return "tous cas";
  if(!min && max) return `< ${fmt(max)} d'ancienneté`;
  if(min && !max) return `≥ ${fmt(min)} d'ancienneté`;
  return `de ${fmt(min)} à < ${fmt(max)}`;
};

const ALL = GROUPS.flatMap(g=>g.tables);

const badgeInfo = id => {
  if(id.startsWith("c1_c2")||id.startsWith("c2_c3")) return {bg:"#1a4f8a",label:"C→C"};
  if(id.startsWith("c")&&id.includes("_b")) return {bg:"#1a4f8a",label:"C→B"};
  if(id==="b1_b2"||id==="b2_b3") return {bg:"#0f6e56",label:"B→B"};
  if(id.includes("_ifip")) return {bg:"#533490",label:"B→A"};
  return {bg:"#888",label:"Custom"};
};

const pickVariant = (rows, eo, acq) => {
  const candidates = rows.filter(r => r.eo === eo);
  if(!candidates.length) return null;
  if(candidates.length === 1) return candidates[0];
  // tri par seuilMin croissant, on prend le dernier dont seuilMin <= acq
  const sorted = [...candidates].sort((a,b)=>(a.seuilMin||0)-(b.seuilMin||0));
  let match = sorted[0];
  for(const r of sorted){
    if((r.seuilMin||0) <= acq) match = r;
  }
  return match;
};

const uniqueEchelons = (rows) => {
  const seen = new Set();
  return rows.filter(r => { if(seen.has(r.eo)) return false; seen.add(r.eo); return true; });
};
const hasVariants = (rows, eo) => rows.filter(r => r.eo === eo).length > 1;

function App() {
  const [tab, setTab] = useState("calc");
  const [tables, setTables] = useState(ALL);
  const [selId, setSelId] = useState("c2_b1");
  const [agent, setAgent] = useState({echelon:"",dateEch:"",dateRecl:""});
  const [result, setResult] = useState(null);

  const table = tables.find(t=>t.id===selId);
  const badge = badgeInfo(selId);

  const calc = useCallback(() => {
    const {echelon,dateEch,dateRecl} = agent;
    if(!echelon||!dateEch||!dateRecl){setResult({err:"Veuillez remplir tous les champs."});return;}
    const eo=parseInt(echelon);
    const acq=daysBetween(dateEch,dateRecl);
    if(acq<0){setResult({err:"La date de reclassement est antérieure à la prise d'échelon."});return;}
    const row = pickVariant(table.rows, eo, acq);
    if(!row){setResult({err:`Échelon ${eo} absent de la table.`});return;}
    const variants = table.rows.filter(r => r.eo === eo);
    const hasV = variants.length > 1;
    const dureeInfo=table.durees.find(d=>d.e===row.ed), dureeJ=dureeInfo?dureeInfo.j:null;
    const conserve=calcC(acq, row.pct, row.fixe, row.deduction||0, dureeJ);
    let dateP=null,joursR=null;
    if(dureeJ!==null){joursR=dureeJ-conserve;dateP=addDays(dateRecl,joursR);}

    // Détail calculatoire
    const base = Math.max(0, acq - (row.deduction||0));
    const pctRaw = Math.floor(base * row.pct / 100);
    const beforeClamp = pctRaw + (row.fixe||0);

    setResult({
      eo, ed:row.ed, pct:row.pct, fixe:row.fixe||0, deduction:row.deduction||0,
      acq, conserve, dureeJ, joursR, dateP,
      dateRF:new Date(dateRecl).toLocaleDateString("fr-FR"),
      hasV, variantNote: row.note || (hasV ? fmtSeuil(row.seuilMin, row.seuilMax) : ""),
      base, pctRaw, beforeClamp,
      clamped: dureeJ !== null && beforeClamp > dureeJ,
    });
  },[agent,table]);

  const updRow = (idx, f, v) => setTables(p => p.map(t => t.id !== selId ? t : { ...t, rows: t.rows.map((r,i) => i === idx ? { ...r, [f]: f === "note" ? v : (v === "" ? 0 : parseInt(v) || 0) } : r) }));
  const updD = (e,v) => setTables(p => p.map(t => t.id !== selId ? t : { ...t, durees: t.durees.map(d => d.e === e ? { ...d, j: v === "" ? null : parseInt(v) } : d) }));
  const addRow = () => {
    const mEo = Math.max(...table.rows.map(r=>r.eo),0), mE = Math.max(...table.durees.map(d=>d.e),0);
    setTables(p => p.map(t => t.id !== selId ? t : { ...t, rows: [...t.rows, {eo:mEo+1,ed:1,pct:0,fixe:0,deduction:0,seuilMin:0,note:""}], durees: [...t.durees, {e:mE+1,j:365}] }));
  };
  const addVariant = (eo) => {
    setTables(p => p.map(t => {
      if(t.id !== selId) return t;
      const idx = t.rows.map(r=>r.eo).lastIndexOf(eo);
      const base = t.rows[idx];
      const newRow = { ...base, seuilMin: TWO_YEARS, note: "à partir de 2 ans" };
      return { ...t, rows: [...t.rows.slice(0,idx+1), newRow, ...t.rows.slice(idx+1)] };
    }));
  };
  const delRow = (idx) => setTables(p => p.map(t => t.id !== selId ? t : { ...t, rows: t.rows.filter((_,i) => i !== idx) }));

  return (
    <div>
      <h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}>Calculateur de reclassement</h2>
      <p style={{fontSize:13,color:"#718096",marginBottom:20}}>Fonction publique de l'État — DGFiP · {ALL.length-1} scénarios officiels</p>

      <div style={{marginBottom:14}}>
        <label className="lbl">Scénario de reclassement</label>
        <div className="sel-row">
          <select value={selId} onChange={e=>{setSelId(e.target.value);setResult(null);setAgent({echelon:"",dateEch:"",dateRecl:""});}} style={{maxWidth:500}}>
            {GROUPS.map(g=><optgroup key={g.label} label={g.label}>{g.tables.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}</optgroup>)}
          </select>
          <span className="badge" style={{background:badge.bg}}>{badge.label}</span>
        </div>
      </div>

      {table && <div className="obar"><strong>Origine :</strong> {table.origine} &nbsp;·&nbsp; <strong>Destination :</strong> {table.destination}</div>}
      {table && table.texte && <div className="warn">📄 <strong>Base juridique :</strong> {table.texte}</div>}

      <div className="tab-bar">
        {[["calc","Calculateur"],["table","Voir / éditer la table"]].map(([k,l])=>(
          <button key={k} className={`tab-btn${tab===k?" active":""}`} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>

      {tab==="calc" && (
        <div>
          <div className="card">
            <div style={{fontWeight:600,fontSize:15,marginBottom:14}}>Situation de l'agent</div>
            <div className="grid3">
              <div>
                <label className="lbl">Échelon actuel (origine)</label>
                <select value={agent.echelon} onChange={e=>setAgent(a=>({...a,echelon:e.target.value}))}>
                  <option value="">— choisir —</option>
                  {table && uniqueEchelons(table.rows).sort((a,b)=>a.eo-b.eo).map(r=>(
                    <option key={r.eo} value={r.eo}>
                      {r.eo}e échelon{hasVariants(table.rows, r.eo) ? " ⚙ (variantes)" : ""}
                    </option>
                  ))}
                </select>
                {agent.echelon && table && hasVariants(table.rows, parseInt(agent.echelon)) && (
                  <div style={{fontSize:11,color:"#854d0e",marginTop:4,fontStyle:"italic"}}>

              </div>
              <div>
                <label className="lbl">Date de reclassement (promotion)</label>
                <input type="date" value={agent.dateRecl} onChange={e=>setAgent(a=>({...a,dateRecl:e.target.value}))} />
              </div>
            </div>
            <button className="btn-p" onClick={calc}>Calculer le reclassement →</button>
          </div>

          {result && (result.err
            ? <div className="err">❌ {result.err}</div>
            : <div className="card">
                <div style={{fontWeight:600,fontSize:15,marginBottom:14}}>Résultat du reclassement</div>
                {result.hasV && (
                  <div className="info">
                    ⚙ <strong>Cas appliqué :</strong> {result.eo}e échelon — <em>{result.variantNote}</em><br/>
                    <span style={{fontSize:11,opacity:.85}}>Ancienneté de l'agent : {fmt(result.acq)} → règle correspondante sélectionnée automatiquement.</span>
                  </div>
                )}
                <div className="rgrid">
                  {[
                    {label:"Échelon de reclassement", value:`${result.ed}e échelon`, sub:`à compter du ${result.dateRF}`, color:"#1a3c6e"},
                    {label:"Ancienneté conservée", value:fmt(result.conserve), sub:result.variantNote || fmtFormule(result.pct,result.fixe,result.deduction), color:"#0f6e56"},
                    result.dateP
                      ? {label:"Prochain échelon", value:`${result.ed+1}e`, sub:`le ${result.dateP}`, color:"#533490"}
                      : {label:"Échelon terminal", value:"Sommet", sub:"Pas d'échelon suivant", color:"#888"},
                  ].map((c,i)=>(
                    <div key={i} className="rc" style={{borderLeftColor:c.color}}>
                      <div className="rc-lbl">{c.label}</div>
                      <div className="rc-val" style={{color:c.color}}>{c.value}</div>
                      <div className="rc-sub">{c.sub}</div>
                    </div>
                  ))}
                </div>
                <div style={{background:"#f7fafc",borderRadius:8,padding:"12px 14px"}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>Détail du calcul</div>
                  {[
                    ["Échelon d'origine", `${result.eo}e échelon${result.hasV?` — ${result.variantNote}`:""}`],
                    ["Ancienneté acquise à la date de reclassement", fmt(result.acq)],
                    ["Règle (libellé officiel)", result.variantNote],
                    ["Formule appliquée", <span className="formula-display">{fmtFormule(result.pct,result.fixe,result.deduction)}</span>],
                    result.deduction > 0 ? ["Base de calcul après déduction", `${fmt(result.acq)} − ${fmt(result.deduction)} = ${fmt(result.base)}`] : null,
                    ["Détail chiffré", `(${result.base} j × ${result.pct}% = ${result.pctRaw} j)${result.fixe>0?` + ${result.fixe} j fixes`:""} = ${result.beforeClamp} j${result.clamped?` → plafonné à ${result.conserve} j`:""}`],
                    ["Ancienneté reprise dans le nouvel échelon", fmt(result.conserve)],
                    ["Durée normale de l'échelon de destination", result.dureeJ?fmt(result.dureeJ):"Échelon terminal"],

                  ].filter(Boolean).map(([k,v],i)=>(
                    <div key={i} className="drow"><span>{k}</span><span>{v}</span></div>
                  ))}
                </div>
              </div>
          )}
        </div>
      )}

      {tab==="table" && table && (
        <div className="card">
          <div className="grid2">

                <strong>Formule générale :</strong> <span className="formula-display">conservée = ((acquis − déduction) × %) + jours fixes</span><br/>
                Exemples : <strong>50% + 182</strong> = 1/2 ancienneté + 6 mois · <strong>150% avec déduction 487</strong> = 3/2 de l'ancienneté au-delà de 1 an 4 mois · <strong>seuilMin 730</strong> = règle applicable à partir de 2 ans d'ancienneté
              </div>

                    <th style={{textAlign:"left"}}>Orig.</th>
                    <th>→ Dest.</th>

                    <th>+ fixe (j)</th>
                    <th>Seuil min (j)</th>
                    <th>Libellé officiel</th>
                    <th></th>

                  {table.rows.map((r,idx) => {
                    const isVariant = idx > 0 && table.rows[idx-1].eo === r.eo;

                    return (
                      <tr key={idx} className={isVariant ? "variant-row" : ""}>

                        </td>

                        <td style={{textAlign:"center"}}><input type="number" className="ti" value={r.pct} min={0} max={300} onChange={e=>updRow(idx,"pct",e.target.value)} /></td>
                        <td style={{textAlign:"center"}}><input type="number" className="ti" style={{width:54}} value={r.deduction||0} min={0} onChange={e=>updRow(idx,"deduction",e.target.value)} /></td>
                        <td style={{textAlign:"center"}}><input type="number" className="ti" style={{width:54}} value={r.fixe||0} min={0} onChange={e=>updRow(idx,"fixe",e.target.value)} /></td>
                        <td style={{textAlign:"center"}}><input type="number" className="ti" style={{width:54}} value={r.seuilMin||0} min={0} onChange={e=>updRow(idx,"seuilMin",e.target.value)} /></td>

                        </td>
                      </tr>

            </div>
            <div>
              <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>Durées des échelons (destination)</div>
              <p style={{fontSize:11,color:"#718096",marginBottom:10}}>Vide = échelon terminal. L'ancienneté conservée est plafonnée à la durée.</p>
              <table className="rt">
                <thead>
                  <tr>
                    <th style={{textAlign:"left"}}>Échelon</th>
                    <th style={{textAlign:"right"}}>Durée (j)</th>
                    <th style={{textAlign:"right"}}>Équivalent</th>
                  </tr>
                </thead>
                <tbody>
                  {table.durees.map(d=>(
                    <tr key={d.e}>
                      <td style={{fontWeight:600}}>{d.e}e</td>
                      <td style={{textAlign:"right"}}><input type="number" className="ti" style={{width:66}} value={d.j!==null&&d.j!==undefined?d.j:""} placeholder="—" onChange={e=>updD(d.e,e.target.value)} /></td>
                      <td style={{textAlign:"right",fontSize:11,color:"#718096"}}>{d.j?fmt(d.j):"Terminal"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
